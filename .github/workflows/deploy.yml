name: CI Validation (Zero-Cost)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-app:
    name: Python Tests & PII Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start LocalStack
        run: |
          docker run -d --name localstack -p 4566:4566 localstack/localstack:latest
          # Simple wait for 200 OK on health endpoint
          timeout 60s bash -c "until curl -s http://localhost:4566/_localstack/health; do sleep 2; done"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install lightweight dependencies
        run: |
          pip install fastapi==0.111.0 uvicorn==0.29.0 prometheus-fastapi-instrumentator==7.0.0 pytest==8.2.0 httpx==0.27.0 boto3==1.34.0 pydantic==2.7.0

      - name: Run PII & Metrics Tests
        env:
          SKIP_MODEL_LOAD: "true"
          SQS_QUEUE_URL: "http://localhost:4566/000000000000/test-queue"
          AWS_ACCESS_KEY_ID: "test"
          AWS_SECRET_ACCESS_KEY: "test"
          AWS_REGION: "us-east-1"
          AWS_ENDPOINT_URL: "http://localhost:4566"
        run: |
          # Create mock queue in LocalStack
          aws --endpoint-url=http://localhost:4566 sqs create-queue --queue-name test-queue --region us-east-1
          
          # Run tests
          export PYTHONPATH=$PYTHONPATH:.
          pytest app/tests/test_main.py

  validate-infra:
    name: Infrastructure Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Helm Lint
        run: helm lint ./helm/opti-inference

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Validate
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate

  build-check:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (No Push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
