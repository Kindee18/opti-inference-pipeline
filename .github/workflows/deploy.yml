name: CI/CD — Opti-Inference Pipeline

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER: opti-inference
  HELM_RELEASE: opti-inference
  HELM_NAMESPACE: inference

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      ecr_url: ${{ steps.login-ecr.outputs.registry }}/${{ env.HELM_RELEASE }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.HELM_RELEASE }}:${{ steps.meta.outputs.tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.HELM_RELEASE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Apply namespace & service accounts
        run: |
          kubectl apply -f k8s/namespace.yaml
          envsubst < k8s/serviceaccount.yaml | kubectl apply -f -
        env:
          KEDA_ROLE_ARN: ${{ secrets.KEDA_ROLE_ARN }}

      - name: Helm upgrade / install
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ./helm/opti-inference \
            --namespace ${{ env.HELM_NAMESPACE }} \
            --create-namespace \
            --set image.repository=${{ needs.build-and-push.outputs.ecr_url }} \
            --set image.tag=${{ needs.build-and-push.outputs.image_tag }} \
            --set keda.sqsQueueUrl=${{ secrets.SQS_QUEUE_URL }} \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=${{ secrets.KEDA_ROLE_ARN }} \
            --wait --timeout 5m

  smoke-test:
    name: Smoke Test /health
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Wait for ALB and run health check
        run: |
          echo "Waiting for ALB hostname..."
          for i in $(seq 1 20); do
            HOST=$(kubectl get ingress opti-inference -n ${{ env.HELM_NAMESPACE }} \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
            [ -n "$HOST" ] && break
            sleep 15
          done
          echo "ALB: $HOST"
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "http://$HOST/health")
          [ "$STATUS" = "200" ] && echo "✅ Health check passed" || (echo "❌ Health check failed: $STATUS" && exit 1)
