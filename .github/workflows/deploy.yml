name: CI Validation (Zero-Cost)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-app:
    name: Python Tests & PII Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install lightweight dependencies
        run: |
          pip install fastapi==0.111.0 uvicorn==0.29.0 prometheus-fastapi-instrumentator==7.0.0 pytest==8.2.0 httpx==0.27.0 boto3==1.34.0 pydantic==2.7.0
      - name: Run PII & Metrics Tests
        env:
          SKIP_MODEL_LOAD: "true"
          SQS_QUEUE_URL: "http://mock-sqs"
          AWS_ACCESS_KEY_ID: "test"
          AWS_SECRET_ACCESS_KEY: "test"
          AWS_REGION: "us-east-1"
        run: |
          cd app
          export PYTHONPATH=$PYTHONPATH:.
          pytest tests/test_main.py

  validate-infra:
    name: Infrastructure Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Helm
        uses: azure/setup-helm@v3
      - name: Helm Lint
        run: helm lint ./helm/opti-inference
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Init & Validate
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: validate-infra
    steps:
      - uses: actions/checkout@v4
      - name: Check for AWS Secrets
        id: check-secrets
        run: |
          if [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "has_secrets=true" >> $GITHUB_OUTPUT
          else
            echo "has_secrets=false" >> $GITHUB_OUTPUT
          fi
      - name: Setup Terraform
        if: steps.check-secrets.outputs.has_secrets == 'true'
        uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        if: steps.check-secrets.outputs.has_secrets == 'true'
        run: terraform init
        working-directory: ./terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: "us-east-1"
      - name: Terraform Apply
        if: steps.check-secrets.outputs.has_secrets == 'true'
        run: terraform apply -auto-approve
        working-directory: ./terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: "us-east-1"

  build-check:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build (No Push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
