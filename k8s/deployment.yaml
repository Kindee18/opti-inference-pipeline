apiVersion: apps/v1
kind: Deployment
metadata:
  name: opti-inference
  namespace: inference
  labels:
    app: opti-inference
spec:
  replicas: 0          # KEDA manages replica count
  selector:
    matchLabels:
      app: opti-inference
  template:
    metadata:
      labels:
        app: opti-inference
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: inference-sa
      nodeSelector:
        node-type: gpu
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
      containers:
        - name: inference
          image: "${ECR_URL}:${IMAGE_TAG}"
          ports:
            - containerPort: 8000
          env:
            - name: SQS_QUEUE_URL
              valueFrom:
                secretKeyRef:
                  name: inference-secrets
                  key: sqs_queue_url
            - name: AWS_REGION
              value: "us-east-1"
          resources:
            requests:
              memory: "4Gi"
              cpu: "1"
              nvidia.com/gpu: "1"
            limits:
              memory: "8Gi"
              cpu: "4"
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 30
          volumeMounts:
            - name: model-cache
              mountPath: /model-cache
      volumes:
        - name: model-cache
          emptyDir: {}
