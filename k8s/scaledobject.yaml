apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: keda-sqs-auth
  namespace: inference
spec:
  podIdentity:
    provider: aws

---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: opti-inference-scaler
  namespace: inference
spec:
  scaleTargetRef:
    name: opti-inference
  minReplicaCount: 0          # scale to zero when idle
  maxReplicaCount: 10
  cooldownPeriod: 120
  pollingInterval: 15
  triggers:
    - type: aws-sqs-queue
      authenticationRef:
        name: keda-sqs-auth
      metadata:
        queueURL: "${SQS_QUEUE_URL}"
        queueLength: "5"        # 1 pod per 5 messages
        awsRegion: "us-east-1"
        identityOwner: pod
